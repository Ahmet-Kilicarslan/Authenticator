<div class="backdrop" (click)="onCancelClick()"></div>

<div class="edit-password-container">


  <div class="edit-password-card">

    <div class="edit-password-header">
      <h2>Edit Password</h2>
    </div>

    <form class="edit-password-form" (ngSubmit)="handleSubmit()" novalidate>
      <div class="form-group">
        <label for="OldPassword" class="form-label">Old Password</label>
        <div class="input-wrapper password-wrapper">
          <input
            [type]="showOldPassword ? 'text' : 'password' "
            id="OldPassword"
            name="OldPassword"
            [(ngModel)]="editPasswordData.oldPassword"
            required
          >
          <button
            type="button"
            class="password-toggle"
            (click)="toggleOldPassword()"
          >
            <span class="toggle-text">{{ showOldPassword ? 'Hide' : 'Show' }}</span>
          </button>
        </div>
        <span class="error-message" [class.show]="oldPasswordError">{{ oldPasswordError }}</span>
      </div>

      <div class="form-group">
        <label for="newPassword" class="form-label">New Password</label>
        <div class="input-wrapper password-wrapper">

          <input
            [type]="showNewPassword ? 'text':'password'"
            id="newPassword"
            name="newPassword"
            [(ngModel)]="editPasswordData.newPassword"
            required
          >
          <button
            type="button"
            class="password-toggle"
            (click)="toggleNewPassword()"
          >
            <span class="toggle-text">{{ showNewPassword ? 'Hide' : 'Show' }}</span>
          </button>
        </div>
        <span class="error-message" [class.show]="newPasswordError">{{ newPasswordError }}</span>
      </div>

      <div class="form-group">
        <label for="confirmNewPassword" class="form-label">New Password</label>
        <div class="input-wrapper password-wrapper">

          <input
            [type]="showConfirmNewPassword ? 'text':'password'"
            id="confirmNewPassword"
            name="confirmNewPassword"
            [(ngModel)]="confirmNewPassword"
            required
          >
          <button
            type="button"
            class="password-toggle"
            (click)="toggleConfirmNewPassword()"
          >
            <span class="toggle-text">{{ showConfirmNewPassword ? 'Hide' : 'Show' }}</span>
          </button>
        </div>
        <span class="error-message" [class.show]="confirmNewPasswordError">{{ confirmNewPasswordError }}</span>


      </div>
      <div class="buttons">
        <button type="submit" class="btn" [class.loading]="isLoading">
          <span class="btn-text">Submit</span>
          <div class="btn-loader">
            <div class="loader-bar"></div>
            <div class="loader-bar"></div>
            <div class="loader-bar"></div>
          </div>
        </button>

        <button type="button" class="btn-primary" (click)="onCancelClick()">
          Cancel
        </button>
      </div>
    </form>

  </div>

</div>
